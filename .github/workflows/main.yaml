name: Build and Deploy train-ticket-reservation

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build WAR
        run: mvn clean package

      - name: Verify WAR
        run: ls -lh target/

      - name: Upload WAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-war
          path: target/*.war

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download WAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-war
          path: target

      - name: Verify Downloaded Artifact
        run: ls -R target

      - name: Deploy to DEV
        run: |
          curl --fail -v \
            -u "${{ secrets.TOMCAT_USER_DEV }}:${{ secrets.TOMCAT_PASSWORD_DEV }}" \
            -T target/*.war \
            "${{ secrets.TOMCAT_URL_DEV }}/manager/text/deploy?path=/train-ticket-reservation&update=true"

      - name: Verify Deployment
        run: |
          curl --fail \
            -u "${{ secrets.TOMCAT_USER_DEV }}:${{ secrets.TOMCAT_PASSWORD_DEV }}" \
            "${{ secrets.TOMCAT_URL_DEV }}/manager/text/list"

  deploy-test:
    needs: deploy-dev
    runs-on: ubuntu-latest

    steps:
      - name: Download WAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-war
          path: target

      - name: Verify Downloaded Artifact
        run: ls -R target

      - name: Deploy to TEST
        run: |
          curl --fail -v \
            -u "${{ secrets.TOMCAT_USER_TEST }}:${{ secrets.TOMCAT_PASSWORD_TEST }}" \
            -T target/*.war \
            "${{ secrets.TOMCAT_URL_TEST }}/manager/text/deploy?path=/train-ticket-reservation&update=true"

      - name: Verify Deployment
        run: |
          curl --fail \
            -u "${{ secrets.TOMCAT_USER_TEST }}:${{ secrets.TOMCAT_PASSWORD_TEST }}" \
            "${{ secrets.TOMCAT_URL_TEST }}/manager/text/list"

  deploy-preprod:
    needs: deploy-test
    runs-on: ubuntu-latest

    steps:
      - name: Download WAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-war
          path: target

      - name: Verify Downloaded Artifact
        run: ls -R target

      - name: Deploy to PREPROD
        run: |
          curl --fail -v \
            -u "${{ secrets.TOMCAT_USER_PREPROD }}:${{ secrets.TOMCAT_PASSWORD_PREPROD }}" \
            -T target/*.war \
            "${{ secrets.TOMCAT_URL_PREPROD }}/manager/text/deploy?path=/train-ticket-reservation&update=true"

      - name: Verify Deployment
        run: |
          curl --fail \
            -u "${{ secrets.TOMCAT_USER_PREPROD }}:${{ secrets.TOMCAT_PASSWORD_PREPROD }}" \
            "${{ secrets.TOMCAT_URL_PREPROD }}/manager/text/list"

  deploy-prod:
    needs: deploy-preprod
    runs-on: ubuntu-latest

    steps:
      - name: Download WAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-war
          path: target

      - name: Verify Downloaded Artifact
        run: ls -R target

      - name: Deploy to PROD
        run: |
          curl --fail -v \
            -u "${{ secrets.TOMCAT_USER_PROD }}:${{ secrets.TOMCAT_PASSWORD_PROD }}" \
            -T target/*.war \
            "${{ secrets.TOMCAT_URL_PROD }}/manager/text/deploy?path=/train-ticket-reservation&update=true"

      - name: Verify Deployment
        run: |
          curl --fail \
            -u "${{ secrets.TOMCAT_USER_PROD }}:${{ secrets.TOMCAT_PASSWORD_PROD }}" \
            "${{ secrets.TOMCAT_URL_PROD }}/manager/text/list"
