name: ci pipeline to build source code with Maven

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven validate
        run: mvn -B -ntp validate

      - name: Maven compile
        run: mvn -B -ntp compile

      - name: Maven test
        run: mvn -B -ntp test

      - name: Maven package
        run: mvn -B -ntp package

      - name: Upload WAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-war
          path: target/*.war

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-war
          path: target

      - name: Deploy to DEV
        env:
          TOMCAT_USER_DEV: ${{ secrets.TOMCAT_USER_DEV }}
          TOMCAT_PASSWORD_DEV: ${{ secrets.TOMCAT_PASSWORD_DEV }}
          TOMCAT_URL_DEV: ${{ secrets.TOMCAT_URL_DEV }}
        run: |
          WAR_FILE="$(ls target/*.war | head -n 1)"
          curl -f -u "${TOMCAT_USER_DEV}:${TOMCAT_PASSWORD_DEV}" \
               -T "${WAR_FILE}" \
               "${TOMCAT_URL_DEV}/manager/text/deploy?path=/file-upload-url-generator&update=true"

  deploy-test:
    needs: deploy-dev
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-war
          path: target

      - name: Deploy to TEST
        env:
          TOMCAT_USER_TEST: ${{ secrets.TOMCAT_USER_TEST }}
          TOMCAT_PASSWORD_TEST: ${{ secrets.TOMCAT_PASSWORD_TEST }}
          TOMCAT_URL_TEST: ${{ secrets.TOMCAT_URL_TEST }}
        run: |
          WAR_FILE="$(ls target/*.war | head -n 1)"
          curl -f -u "${TOMCAT_USER_TEST}:${TOMCAT_PASSWORD_TEST}" \
               -T "${WAR_FILE}" \
               "${TOMCAT_URL_TEST}/manager/text/deploy?path=/file-upload-url-generator&update=true"

  deploy-preprod:
    needs: deploy-test
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-war
          path: target

      - name: Deploy to PRE-PROD
        env:
          TOMCAT_USER_PREPROD: ${{ secrets.TOMCAT_USER_PREPROD }}
          TOMCAT_PASSWORD_PREPROD: ${{ secrets.TOMCAT_PASSWORD_PREPROD }}
          TOMCAT_URL_PREPROD: ${{ secrets.TOMCAT_URL_PREPROD }}
        run: |
          WAR_FILE="$(ls target/*.war | head -n 1)"
          curl -f -u "${TOMCAT_USER_PREPROD}:${TOMCAT_PASSWORD_PREPROD}" \
               -T "${WAR_FILE}" \
               "${TOMCAT_URL_PREPROD}/manager/text/deploy?path=/file-upload-url-generator&update=true"

  deploy-prod:
    needs: deploy-preprod
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-war
          path: target

      - name: Deploy to PROD
        env:
          TOMCAT_USER_PROD: ${{ secrets.TOMCAT_USER_PROD }}
          TOMCAT_PASSWORD_PROD: ${{ secrets.TOMCAT_PASSWORD_PROD }}
          TOMCAT_URL_PROD: ${{ secrets.TOMCAT_URL_PROD }}
        run: |
          WAR_FILE="$(ls target/*.war | head -n 1)"
          curl -f -u "${TOMCAT_USER_PROD}:${TOMCAT_PASSWORD_PROD}" \
               -T "${WAR_FILE}" \
               "${TOMCAT_URL_PROD}/manager/text/deploy?path=/file-upload-url-generator&update=true"
