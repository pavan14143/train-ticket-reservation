name: ci pipeline to build source code with Maven

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build WAR File
        run: mvn clean package -DskipTests

      - name: Find WAR File
        run: |
          WAR_FILE=$(ls target/*.war | head -n 1)
          echo "WAR_FILE=$WAR_FILE" >> $GITHUB_ENV

      - name: Upload WAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: war-file
          path: ${{ env.WAR_FILE }}

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download WAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: war-file

      - name: Deploy to DEV
        env:
          URL: ${{ secrets.TOMCAT_URL_DEV }}
          USER: ${{ secrets.TOMCAT_USER_DEV }}
          PASS: ${{ secrets.TOMCAT_PASS_DEV }}

        run: |
          WAR_FILE=$(ls *.war | head -n 1)

          echo "Deploying $WAR_FILE to DEV"

          curl -v -u "$USER:$PASS" "$URL/list"

          curl -v -u "$USER:$PASS" \
            --fail \
            --show-error \
            -T "$WAR_FILE" \
            "$URL/deploy?path=/train-ticket-reservation&update=true"

  deploy-test:
    needs: deploy-dev
    runs-on: ubuntu-latest

    steps:
      - name: Download WAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: war-file

      - name: Deploy to TEST
        env:
          URL: ${{ secrets.TOMCAT_URL_TEST }}
          USER: ${{ secrets.TOMCAT_USER_TEST }}
          PASS: ${{ secrets.TOMCAT_PASS_TEST }}

        run: |
          WAR_FILE=$(ls *.war | head -n 1)

          echo "Deploying $WAR_FILE to TEST"

          curl -v -u "$USER:$PASS" "$URL/list"

          curl -v -u "$USER:$PASS" \
            --fail \
            --show-error \
            -T "$WAR_FILE" \
            "$URL/deploy?path=/train-ticket-reservation&update=true"
